<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会社概要｜永翔テクニカ合同会社</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header"></div>
  <main>
    <section>
      <h2>会社概要</h2>
      <table class="info-table">
        <tr>
          <th>会社名</th>
          <td>永翔テクニカ合同会社</td>
        </tr>
        <tr>
          <th>所在地</th>
          <td>東京都調布市小島町1丁目11番30</td>
        </tr>
        <tr>
          <th>設立</th>
          <td>2022年7月27日</td>
        </tr>
        <tr>
          <th>代表者</th>
          <td>田代 建仁</td>
        </tr>
        <tr>
          <th>事業内容</th>
          <td>業務用ガス機器を中心とした厨房機器の修理・メンテナンス</td>
        </tr>
      </table>
    </section>
  </main>

  <footer>
    <div class="footer-logo">永翔テクニカ合同会社</div>
    <p class="footer-copy">© 2024 Eisho Technica G.K. All rights reserved.</p>
  </footer>

   <script>
  fetch('header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header').innerHTML = data;

      // ハンバーガーメニュー用
      const toggle = document.querySelector('.menu-toggle');
      const nav = document.querySelector('nav');

      toggle.addEventListener('click', () => {
        nav.classList.toggle('active');
      });
    });
</script>
</body>
</html>
